<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Hub - Talentland</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="header">
        <div class="logo">
            <span class="g-blue">A</span><span class="g-red">I</span> <span class="g-yellow">H</span><span class="g-blue">u</span><span class="g-green">b</span>
        </div>
        <div class="search-container">
            <svg class="search-icon" focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"></path>
            </svg>
            <input type="text" id="searchInput" placeholder="Busca herramientas, apps o videos..." autocomplete="off">
            <button class="clear-icon" id="clearSearch" aria-label="Limpiar búsqueda" style="display: none;">
                <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path>
                </svg>
            </button>
        </div>
    </header>

    <main class="main-content">
        <div class="grid-container" id="toolsGrid">
            <!-- Cards will be injected via JS -->
        </div>
        <div id="noResults" class="no-results" style="display: none;">
            <p>No se encontraron resultados de búsqueda.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
